<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavelet Variable Font</title>

<style>
@font-face {
  font-family: "Wavelet";
  src: url("WaveletVF.ttf") format("truetype-variations");
}

body {
  margin: 40px;
  font-family: sans-serif;
  background: white;
  color: black;
}

.container {
  max-width: 800px;
  margin: auto;
}

input[type="text"] {
  width: 100%;
  font-size: 20px;
  margin-bottom: 30px;
  padding: 10px;
}

.controls {
  margin-bottom: 30px;
}

label {
  display: block;
  margin-bottom: 5px;
}

input[type="range"] {
  width: 100%;
  margin-bottom: 20px;
}

.preview {
  font-family: "Wavelet";
  font-size: 64px;
  line-height: 1.2;
  word-break: break-word;
}
</style>
</head>

<body>
<div class="container">

<input type="text" id="text" value="Wavelet Variable Font">

<div class="controls">
  <label>Weight: <span id="weightVal">400</span></label>
  <input type="range" id="weight" min="400" max="700" value="400">

  <label>Wave: <span id="waveVal">0</span></label>
  <input type="range" id="wave" min="0" max="1" step="0.01" value="0">
</div>

<div id="preview" class="preview">
  Wavelet Variable Font
</div>

</div>

<script>
const text = document.getElementById("text");
const weight = document.getElementById("weight");
const wave = document.getElementById("wave");

const preview = document.getElementById("preview");
const weightVal = document.getElementById("weightVal");
const waveVal = document.getElementById("waveVal");

function update() {
  preview.textContent = text.value;

  const wght = weight.value;
  const wave = wave.value;

  preview.style.fontVariationSettings =
    `"wght" ${wght}, "wave" ${wv}`;

  weightVal.textContent = wght;
  waveVal.textContent = wv;
}

text.addEventListener("input", update);
weight.addEventListener("input", update);
wave.addEventListener("input", update);

update();
</script>

</body>
</html>
